# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Build, SCA, SAST Pipeline

on:
  push:
    branches: [ "main"]
  workflow_dispatch:
    

jobs:
  # ============================================
  # JOB 1: Build and Testing
  # ============================================
  build-and-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: fhpeto/xashy-university-portal

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./
        run: mvn -B clean verify --file pom.xml

  # ============================================
  # JOB 2: Software Composition Analysis (SCA)
  # ============================================
  software-composition-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: fhpeto/xashy-university-portal

      - name: Build with Maven
        run: mvn -B clean verify --file pom.xml

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Scan SBOM with Grype
        run: |
          curl -sSfL https://get.anchore.io/grype | sudo sh -s -- -b /usr/local/bin
          grype --fail-on low sbom:sbom.spdx.json

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: war-artifact
          path: ./target/*.war
          if-no-files-found: error

  # ============================================
  # JOB 4: SAST with SonarQube
  # ============================================
  sast-sonarqube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: fhpeto/xashy-university-portal
          ref: main
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./app
        run:
          mvn -B clean verify
      
      - name: Run SonarQube Analysis
        uses: SonarSource/sonarqube-scan-action@v8.0.0 # Ex: v4.1.0 or sha1, See the latest version at https://github.com/marketplace/actions/official-sonarqube-scan
        with:
          projectBaseDir: app
          scannerVersion: 6.2.0.4584
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}