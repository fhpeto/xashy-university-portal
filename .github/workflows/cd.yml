name: CD - Upload artifact to S3

on:
  # Chain off the CI pipeline so we ship the exact artifact that was scanned.
  workflow_run:
    workflows: ["Build, SCA, SAST Pipeline"]
    types:
      - completed
  # Manual redeploy: pass the CI run ID whose war-artifact you want to push.
  workflow_dispatch:
    inputs:
      run_id:
        description: "CI run ID to pull the war-artifact from"
        required: true

permissions:
  contents: read
  actions: read     # required to download artifacts from another workflow run

jobs:
  upload-to-s3:
    runs-on: ubuntu-latest


    env:
      AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY}}
      AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}

    # Skip if the CI build failed; always allow the manual path through.
    if: >
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download war artifact from CI run
        uses: actions/download-artifact@v4
        with:
          name: war-artifact
          path: ./artifact
          # workflow_run gives us the upstream run id; dispatch supplies it manually.
          run-id: ${{ github.event.workflow_run.id || inputs.run_id }}
          # Required when run-id points at a different workflow run: the action
          # needs a token to query that run's artifacts via the REST API.
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install AWS CLI
        id: install-aws-cli
        uses: unfor19/install-aws-cli-action@v1
        with:
            version: 2                         # default
            verbose: false                     # default
            arch: amd64                        # allowed values: amd64, x86, x64, arm, arm64

      - name: Upload to S3
        env:
          BUCKET: xashy-uni-portal-artifact-b213f4c8
          APP: xashy-university-portal
        run: |
          set -euo pipefail
          WAR=$(ls ./artifact/*.war | head -n1)
          echo "Found artifact: $WAR"

          # head_sha = the commit that was built/scanned in CI.
          # (On manual dispatch this falls back to the dispatch ref's SHA.)
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"

          # Immutable, SHA-keyed copy for traceability...
          aws s3 cp "$WAR" "s3://${BUCKET}/${APP}/${SHA}/app.war"
          # ...plus a moving 'latest' pointer for the deploy step to grab.
          aws s3 cp "$WAR" "s3://${BUCKET}/${APP}/latest/app.war"

          echo "Uploaded to s3://${BUCKET}/${APP}/${SHA}/app.war"

  deploy-to-tomcat:
    needs: upload-to-s3
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2

    steps:
      - name: Install AWS CLI
        uses: unfor19/install-aws-cli-action@v1
        with:
          version: 2
          arch: amd64

      # The instance is in a private subnet (no SSH); SSM Run Command is the
      # only ingress-free path. The instance role already grants s3:GetObject
      # on the artifact bucket, so it pulls the WAR itself.
      - name: Deploy artifact to Tomcat via SSM
        env:
          BUCKET: xashy-uni-portal-artifact-b213f4c8
          APP: xashy-university-portal
          INSTANCE_NAME: web-app-xashy-uni-portal
        run: |
          set -euo pipefail

          # Deploy the exact SHA-keyed artifact this run uploaded.
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          S3_URI="s3://${BUCKET}/${APP}/${SHA}/app.war"

          # Resolve the target instance by its Name tag.
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${INSTANCE_NAME}" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "No running instance found with tag Name=${INSTANCE_NAME}" >&2
            exit 1
          fi
          echo "Target instance: $INSTANCE_ID"

          # Commands run as root by the SSM agent. Deploy as ROOT.war so the
          # portal is served at '/'; stop Tomcat first for an atomic swap.
          cat > ssm-params.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "aws s3 cp ${S3_URI} /tmp/app.war",
              "systemctl stop tomcat",
              "rm -rf /opt/tomcat/webapps/ROOT /opt/tomcat/webapps/ROOT.war",
              "install -o tomcat -g tomcat -m 0644 /tmp/app.war /opt/tomcat/webapps/ROOT.war",
              "systemctl start tomcat"
            ]
          }
          EOF

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${APP} ${SHA}" \
            --parameters file://ssm-params.json \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD_ID"

          # Block on completion; 'wait' exits non-zero on failure, so capture
          # the real status afterwards for clearer logs.
          aws ssm wait command-executed \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)
          echo "----- stdout -----"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text

          if [ "$STATUS" != "Success" ]; then
            echo "----- stderr -----" >&2
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' --output text >&2
            echo "Deploy failed with status: $STATUS" >&2
            exit 1
          fi
          echo "Deploy succeeded: $STATUS"